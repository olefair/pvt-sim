name: ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  headless:
    name: Headless checks (baseline + routine pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.txt

      - name: Install headless test surface
        run: |
          python -m pip install -U pip
          python -m pip install -e .
          python -m pip install pytest scipy

      - name: Fast baseline
        run: python scripts/run_premerge_checks.py --baseline-only

      - name: Routine pytest surface
        run: python -m pytest

      - name: Step summary
        if: success()
        shell: bash
        run: |
          {
            echo "## Headless CI"
            echo ""
            echo "- **Baseline** (modules + curated tests + canonical CLI examples): \`python scripts/run_premerge_checks.py --baseline-only\`"
            echo "- **Routine pytest** (\`pyproject.toml\` testpaths): \`python -m pytest\`"
          } >> "$GITHUB_STEP_SUMMARY"

  build:
    name: Build distributions
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.txt

      - name: Install build toolchain
        run: |
          python -m pip install -U pip
          python -m pip install build

      - name: Build source and wheel distributions
        run: python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-ci
          path: dist/*
