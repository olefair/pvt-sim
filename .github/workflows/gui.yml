name: gui

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gui-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gui-contracts:
    name: Windows GUI contracts (advisory)
    runs-on: windows-latest
    timeout-minutes: 60
    continue-on-error: true
    env:
      PYTHONUTF8: "1"
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install GUI test surface
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[full]"
          python -m pip install pytest openpyxl

      - name: Run GUI contract tests
        run: pytest --run-gui-contracts -m gui_contract

      - name: Summarize GUI lane
        if: always()
        shell: bash
        run: |
          {
            echo "## GUI contract lane"
            echo ""
            echo "This lane is advisory until the Windows GUI surface is stable enough to require on every pull request."
          } >> "$GITHUB_STEP_SUMMARY"
