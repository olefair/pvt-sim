name: static

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: static-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static:
    name: Static analysis (advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install static toolchain
        run: |
          python -m pip install -U pip
          python -m pip install -e .
          python -m pip install black flake8 mypy

      - name: Check formatting with Black
        id: black
        continue-on-error: true
        run: python -m black --check --quiet src tests scripts

      - name: Lint with Flake8
        id: flake8
        continue-on-error: true
        shell: bash
        run: |
          set +e
          python -m flake8 src tests scripts > flake8.txt
          status=$?
          set -e
          tail -n 200 flake8.txt || true
          exit "$status"

      - name: Type check with mypy
        id: mypy
        continue-on-error: true
        shell: bash
        run: |
          set +e
          python -m mypy src > mypy.txt
          status=$?
          set -e
          tail -n 200 mypy.txt || true
          exit "$status"

      - name: Summarize static results
        if: always()
        shell: bash
        run: |
          {
            echo "## Static analysis"
            echo ""
            echo "This lane is advisory while the existing repo-wide formatting, lint, and typing backlog is reduced."
            echo ""
            echo "- \`black --check src tests scripts\`: ${{ steps.black.outcome }}"
            echo "- \`flake8 src tests scripts\`: ${{ steps.flake8.outcome }}"
            echo "- \`mypy src\`: ${{ steps.mypy.outcome }}"
          } >> "$GITHUB_STEP_SUMMARY"
