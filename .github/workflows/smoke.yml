name: smoke

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Headless smoke
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install smoke test surface
        run: |
          python -m pip install -U pip
          python -m pip install -e .
          python -m pip install pytest scipy

      - name: Validate repo modules
        run: python scripts/validate_modules.py

      - name: Run fast tests
        run: |
          pytest tests/unit/test_flash.py \
                 tests/unit/test_saturation.py \
                 tests/unit/test_runtime_contract.py \
                 tests/unit/test_cli_validate.py \
                 -q

      - name: Validate phase-envelope example
        run: pvtsim validate examples/phase_envelope_config.json

      - name: Run phase-envelope example
        run: pvtsim run --no-artifacts examples/phase_envelope_config.json

      - name: Validate PT-flash example
        run: pvtsim validate examples/pt_flash_config.json

      - name: Run PT-flash example
        run: pvtsim run --no-artifacts examples/pt_flash_config.json
